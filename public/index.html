<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下一个是谁 · UP主语录</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #fb7185;
      --accent2: #38bdf8;
      --text: #e8e8e8;
      --text-dim: #888;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 48px 24px 32px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: .04em;
    }
    header h1 span { color: var(--accent); }
    header p {
      margin-top: 8px;
      color: var(--text-dim);
      font-size: .9rem;
    }

    /* ── UP主 卡片网格 ── */
    .up-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .up-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
    }
    .up-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .up-card.active { border-color: var(--accent); background: var(--surface2); }

    .up-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .up-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .up-name { font-size: 1rem; font-weight: 600; }
    .up-tag {
      display: inline-block;
      margin-top: 2px;
      font-size: .7rem;
      padding: 2px 8px;
      border-radius: 20px;
      opacity: .8;
    }

    .quotes-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .quotes-list li {
      font-size: .82rem;
      color: var(--text-dim);
      padding: 6px 10px;
      background: var(--bg);
      border-radius: 8px;
      border-left: 3px solid var(--card-color, #444);
      transition: color .2s;
    }
    .up-card:hover .quotes-list li,
    .up-card.active .quotes-list li {
      color: var(--text);
    }

    /* ── Chat Panel ── */
    #chat-section {
      max-width: 760px;
      margin: 0 auto 60px;
      padding: 0 24px;
      display: none;
    }
    #chat-section.visible { display: block; }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .chat-header .up-avatar { width: 44px; height: 44px; font-size: 1.2rem; }
    .chat-header-info h2 { font-size: 1.1rem; font-weight: 600; }
    .chat-header-info p { font-size: .8rem; color: var(--text-dim); margin-top: 2px; }


    /* Messages */
    #messages {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 200px;
      max-height: 440px;
      overflow-y: auto;
      padding: 4px 2px;
      margin-bottom: 16px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 10px;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { flex-direction: row-reverse; }
    .msg-bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: .9rem;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .msg.assistant .msg-bubble {
      background: var(--surface2);
      border-bottom-left-radius: 4px;
    }
    .msg.user .msg-bubble {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem;
      font-weight: 700;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input row */
    .input-row {
      display: flex;
      gap: 8px;
    }
    .input-row textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color .2s;
    }
    .input-row textarea:focus { border-color: var(--accent2); }
    .input-row textarea::placeholder { color: var(--text-dim); }
    .send-btn {
      width: 44px; height: 44px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity .2s;
      display: flex; align-items: center; justify-content: center;
      align-self: flex-end;
    }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .send-btn:not(:disabled):hover { opacity: .85; }

    .error-bar {
      background: #3f1313;
      border: 1px solid #7f2020;
      color: #fca5a5;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: .82rem;
      margin-bottom: 10px;
      display: none;
    }
    .error-bar.visible { display: block; }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      color: var(--text-dim);
      font-size: .75rem;
      border-top: 1px solid var(--border);
    }

    /* ── Tab buttons ── */
    .tab-btn {
      padding: 8px 22px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: .9rem;
      cursor: pointer;
      transition: all .2s;
    }
    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Game styles ── */
    .game-label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .game-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }
    .preset-btn {
      padding: 5px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: .8rem;
      cursor: pointer;
      transition: border-color .2s;
    }
    .preset-btn:hover { border-color: var(--accent); }
    .team-slot {
      min-height: 48px;
      background: var(--bg);
      border-radius: 8px;
      padding: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      border: 1px dashed var(--border);
    }
    .picker-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .2s, transform .15s;
      position: relative;
    }
    .picker-avatar:hover { transform: scale(1.1); }
    .picker-avatar.in-a { border-color: #fb7185; }
    .picker-avatar.in-b { border-color: #38bdf8; }
    .picker-avatar.in-c { border-color: #34d399; }
    .team-chip {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 8px;
      background: var(--surface2);
      border-radius: 12px;
      font-size: .78rem;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .dot-pulse {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
  </style>
</head>

  <h1>下一个是谁 · <span>UP主语录</span></h1>

    <button class="tab-btn" id="tab-game" onclick="switchTab('game')">🎮 模拟比赛</button>
  </div>
</header>

</div><!-- /section-chat -->

        <button class="preset-btn" onclick="setPreset('猜词接力：每队队员背对屏幕，由队友用动作提示猜词，1分钟内猜对最多的队伍获胜。')">🎭 猜词接力</button>

    </div>

    <div class="game-block" style="margin-top:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <label class="game-label" style="margin:0">分组（3组各2人）</label>
        <button class="preset-btn" onclick="randomTeams()">🎲 随机分组</button>
      </div>
      <div id="teams-container" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px"></div>
      <div id="unassigned-row" style="display:none;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;font-size:.8rem;padding:6px 0;border-top:1px solid var(--border)"></div>
      <div style="font-size:.75rem;color:var(--text-dim);margin-bottom:6px">点击头像循环切换所在组</div>
      <div id="up-picker" style="display:flex;gap:8px;flex-wrap:wrap"></div>
    </div>

    <button id="start-game-btn" onclick="startGame()" style="width:100%;margin-top:20px;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s">
      🎬 开始比赛！
    </button>

    <div id="game-error" class="error-bar" style="margin-top:12px"></div>

    <div id="commentary-box" style="display:none;margin-top:24px">
      <!-- 比赛标题栏 -->
      <div id="match-header" style="background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:12px;padding:16px 20px;margin-bottom:16px;display:none">
        <div style="text-align:center;font-size:.72rem;color:#888;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px">⚡ 比赛直播</div>
        <div class="match-teams-row" style="display:flex;align-items:flex-start;justify-content:center;gap:8px"></div>
      </div>

      <!-- 解说流 -->
      <div id="commentary-feed"></div>

      <!-- loading dots -->
      <div id="commentary-loading" style="display:none;padding:16px;text-align:center">
        <div style="display:inline-flex;gap:6px;align-items:center;color:#888;font-size:.85rem">

          &nbsp;解说员正在激情发挥…
        </div>
      </div>
    </div>
  </div>
</div>

// ── 状态 ──────────────────────────────────────────────────────────────────
let currentUp = null;
let chatHistory = [];  // [{role, content}]
let isLoading = false;

// ── 渲染 UP主 卡片 ────────────────────────────────────────────────────────
const grid = document.getElementById("up-grid");

UPS.forEach(up => {
  const card = document.createElement("div");
  card.className = "up-card";
  card.dataset.id = up.id;
  card.style.setProperty("--card-color", up.color);
  card.innerHTML = `
    <div class="up-card-header">
      <div class="up-avatar" style="background:${up.bgColor};color:${up.color}">${up.emoji}</div>
      <div>
        <div class="up-name">${up.name}</div>
        <span class="up-tag" style="background:${up.bgColor};color:${up.color}">${up.tag}</span>
      </div>
    </div>
    <ul class="quotes-list">
      ${up.quotes.slice(0, 3).map(q => `<li>「${q}」</li>`).join("")}
    </ul>
  `;
  card.addEventListener("click", () => selectUp(up));
  grid.appendChild(card);
});

// ── 选择 UP 主 ────────────────────────────────────────────────────────────
function selectUp(up) {
  currentUp = up;
  chatHistory = [];

  document.querySelectorAll(".up-card").forEach(c => c.classList.remove("active"));
  document.querySelector(`[data-id="${up.id}"]`).classList.add("active");

  document.getElementById("chat-avatar").textContent = up.emoji;
  document.getElementById("chat-avatar").style.background = up.bgColor;
  document.getElementById("chat-avatar").style.color = up.color;
  document.getElementById("chat-name").textContent = up.name;
  document.getElementById("chat-desc").textContent = up.tag;

  document.getElementById("messages").innerHTML = "";
  hideError();

  // 打招呼
  const greeting = getGreeting(up);
  appendMessage("assistant", greeting, up);

  const section = document.getElementById("chat-section");
  section.classList.add("visible");
  section.scrollIntoView({ behavior: "smooth", block: "start" });
}

function getGreeting(up) {

// ── 发送消息 ──────────────────────────────────────────────────────────────
document.getElementById("send-btn").addEventListener("click", sendMessage);
document.getElementById("user-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Auto-resize textarea
document.getElementById("user-input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});

async function sendMessage() {
  if (!currentUp || isLoading) return;
  const text = document.getElementById("user-input").value.trim();
  if (!text) return;

  hideError();
  document.getElementById("user-input").value = "";
  document.getElementById("user-input").style.height = "auto";
  appendMessage("user", text, currentUp);

  chatHistory.push({ role: "user", content: text });

  setLoading(true);
  const typingEl = showTyping();

  try {
    const reply = await callClaude(currentUp.style, chatHistory);
    typingEl.remove();
    appendMessage("assistant", reply, currentUp);
    chatHistory.push({ role: "assistant", content: reply });
  } catch (err) {
    typingEl.remove();
    showError(err.message || "请求失败，请检查 API Key 或网络");
    // 回滚最后一条 user 消息
    chatHistory.pop();
  } finally {
    setLoading(false);
  }
}

// ── 后端代理调用 ──────────────────────────────────────────────────────────
async function callClaude(systemPrompt, history) {
  const resp = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system: systemPrompt, messages: history }),
  });

  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
  return data.text;
}

// ── UI 工具函数 ───────────────────────────────────────────────────────────
function appendMessage(role, text, up) {
  const msgsEl = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `msg ${role}`;

  if (role === "assistant") {
    div.innerHTML = `
      <div class="msg-avatar" style="background:${up.bgColor};color:${up.color}">${up.emoji}</div>
      <div class="msg-bubble">${escapeHtml(text)}</div>
    `;
  } else {
    div.innerHTML = `
      <div class="msg-bubble">${escapeHtml(text)}</div>
      <div class="msg-avatar" style="background:#1d4ed8;color:#fff">你</div>
    `;
  }

  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function showTyping() {
  const msgsEl = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg assistant";
  div.innerHTML = `
    <div class="msg-avatar" style="background:${currentUp.bgColor};color:${currentUp.color}">${currentUp.emoji}</div>
    <div class="typing-indicator"><span></span><span></span><span></span></div>
  `;
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return div;
}

function setLoading(v) {
  isLoading = v;
  document.getElementById("send-btn").disabled = v;
  document.getElementById("user-input").disabled = v;
}

function showError(msg) {
  const el = document.getElementById("error-bar");
  el.textContent = msg;
  el.classList.add("visible");
}
function hideError() {
  document.getElementById("error-bar").classList.remove("visible");
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ── Tab 切换 ──────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById("section-chat").style.display = tab === "chat" ? "" : "none";
  document.getElementById("section-game").style.display = tab === "game" ? "" : "none";
  document.getElementById("tab-chat").classList.toggle("active", tab === "chat");
  document.getElementById("tab-game").classList.toggle("active", tab === "game");
  if (tab === "game") initGamePicker();
}

// ── 比赛功能 ──────────────────────────────────────────────────────────────
// 3组2人同时参赛
let teams = [[], [], []]; // teams[0..2] 各含2个id
const NAME_MAP = { yuge:"雨哥", amazong:"啊吗粽", liyuan:"力元君", sanmu:"三木", zhbie:"哲别", daxia:"徐大虾" };
const NICKNAME_MAP = { amazong:"瑞哥", sanmu:"神", zhbie:"哲别", daxia:"虾哥" };

// 固定搭档队名（key = 两id排序后用_连接）
const PAIR_NAMES = {
  "liyuan_yuge":   "黑白双煞",
  "amazong_sanmu": "Double J",
  "daxia_zhbie":   "虾折腾",
  "amazong_liyuan":"一生之敌",
  "liyuan_zhbie":  "AA兄弟",
  "amazong_zhbie": "父子组",
  "daxia_sanmu":   "川渝组",
  "sanmu_yuge":    "冠军组",
};

function pairKey(a, b) {
  return [a, b].sort().join("_");
}

function getPairName(a, b) {
  return PAIR_NAMES[pairKey(a, b)] || null;
}

// 随机有趣队名（当没有固定名时用）
const FUN_NAMES = ["神秘组合","临时工","试一下","宿命对决","意外之喜","随机应变","命中注定","就这样吧"];
let funNameIdx = 0;
function getFunName() { return FUN_NAMES[funNameIdx++ % FUN_NAMES.length]; }

function initGamePicker() {
  const picker = document.getElementById("up-picker");
  if (picker.children.length) return;
  UPS.forEach(up => {
    const el = document.createElement("div");
    el.className = "picker-avatar";
    el.dataset.id = up.id;
    el.style.background = up.bgColor;
    el.style.color = up.color;
    el.title = up.name;
    el.textContent = up.emoji;
    el.addEventListener("click", () => cycleTeam(up.id));
    picker.appendChild(el);
  });
  randomTeams();
}

// 点击头像：未分组→组1→组2→组3→未分组
function cycleTeam(id) {
  const cur = teams.findIndex(t => t.includes(id));
  if (cur >= 0) teams[cur] = teams[cur].filter(x => x !== id);
  // 找下一个未满的组（从cur+1开始循环）
  let next = -1;
  for (let i = 1; i <= 3; i++) {
    const idx = (cur + i) % 4; // 0=未分组,1/2/3=组
    if (idx === 0) { next = -1; break; } // 回到未分组
    if (teams[idx-1].length < 2) { next = idx-1; break; }
  }
  if (next >= 0) teams[next].push(id);
  renderTeams();
}

function randomTeams() {
  funNameIdx = 0;
  const ids = UPS.map(u => u.id).sort(() => Math.random() - .5);
  teams = [ids.slice(0,2), ids.slice(2,4), ids.slice(4,6)];
  renderTeams();
}

const TEAM_COLORS = ["#fb7185","#38bdf8","#34d399"];
const TEAM_LABELS = ["红队","蓝队","绿队"];

function getTeamDisplayName(idx) {
  const t = teams[idx];
  if (t.length === 2) {
    return getPairName(t[0], t[1]) || getFunName();
  }
  return TEAM_LABELS[idx];
}

function renderTeams() {
  funNameIdx = 0; // 重置，保证每次render顺序一致
  const container = document.getElementById("teams-container");
  container.innerHTML = "";
  for (let i = 0; i < 3; i++) {
    const color = TEAM_COLORS[i];
    const name = getTeamDisplayName(i);
    const members = teams[i];
    const div = document.createElement("div");
    div.style.cssText = `background:var(--surface);border:1px solid ${color}44;border-top:2px solid ${color};border-radius:10px;padding:12px;`;
    div.innerHTML = `
      <div style="font-size:.75rem;font-weight:700;color:${color};margin-bottom:8px;letter-spacing:.04em">${name}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;min-height:36px">
        ${members.map(id => {
          const up = UPS.find(u=>u.id===id);
          return `<div class="team-chip" style="border:1px solid ${color}55"><span>${up.emoji}</span><span>${NAME_MAP[id]}</span></div>`;
        }).join("") || `<span style="font-size:.75rem;color:var(--text-dim)">空</span>`}
      </div>
    `;
    container.appendChild(div);
  }

  // 未分配的人
  const unassigned = UPS.filter(u => !teams.flat().includes(u.id));
  const unDiv = document.getElementById("unassigned-row");
  if (unassigned.length) {
    unDiv.style.display = "flex";
    unDiv.innerHTML = `<span style="font-size:.75rem;color:var(--text-dim);align-self:center">未分配：</span>` +
      unassigned.map(u => `<span style="font-size:.8rem;color:var(--text-dim)">${u.emoji}${NAME_MAP[u.id]}</span>`).join("");
  } else {
    unDiv.style.display = "none";
  }

  // 更新picker头像状态
  document.querySelectorAll(".picker-avatar").forEach(el => {
    el.classList.remove("in-a","in-b","in-c");
    const ti = teams.findIndex(t => t.includes(el.dataset.id));
    if (ti === 0) el.classList.add("in-a");
    else if (ti === 1) el.classList.add("in-b");
    else if (ti === 2) el.classList.add("in-c");
  });
}

function setPreset(text) {
  document.getElementById("game-rule").value = text;
}

// 段落序号 → 样式配置
const PARA_STYLES = [
  { icon:"🎙️", label:"开场",   accent:"#60a5fa", bg:"#0c1929" },
  { icon:"⚡",  label:"进行中", accent:"#fb923c", bg:"#1f0f00" },
  { icon:"🔥",  label:"高潮",   accent:"#fb7185", bg:"#1f0007" },
  { icon:"😱",  label:"意外",   accent:"#c084fc", bg:"#170a2e" },
  { icon:"💥",  label:"决战",   accent:"#f472b6", bg:"#1f0018" },
  { icon:"🏆",  label:"结果",   accent:"#34d399", bg:"#001f10" },
];

function getParaStyle(idx) {
  return PARA_STYLES[Math.min(idx, PARA_STYLES.length - 1)];
}

let paraCount = 0;
let currentCard = null;    // 当前正在打字的卡片 p 元素
let typeQueue = [];
let isTyping = false;

function flushTypeQueue() {
  if (isTyping || typeQueue.length === 0) return;
  isTyping = true;
  const { el, text, onDone } = typeQueue.shift();
  let i = 0;
  const speed = Math.max(8, Math.min(25, 2000 / text.length)); // 自适应速度
  function tick() {
    if (i < text.length) {
      el.textContent += text[i++];
      el.closest(".commentary-card")?.scrollIntoView({ behavior: "smooth", block: "end" });
      setTimeout(tick, speed);
    } else {
      isTyping = false;
      onDone?.();
      flushTypeQueue();
    }
  }
  tick();
}

function typeText(el, text, onDone) {
  typeQueue.push({ el, text, onDone });
  flushTypeQueue();
}

function addCommentaryCard(text, idx) {
  const feed = document.getElementById("commentary-feed");
  const style = getParaStyle(idx);
  const isLast = text.includes("获胜") || text.includes("冠军") || text.includes("胜利") || text.includes("赢了");

  const card = document.createElement("div");
  card.className = "commentary-card";
  card.style.cssText = `
    background:${style.bg};
    border:1px solid ${style.accent}33;
    border-left:3px solid ${style.accent};
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:12px;
    animation:slideIn .3s ease;
    ${isLast ? `box-shadow:0 0 20px ${style.accent}44;` : ""}
  `;

  const meta = document.createElement("div");
  meta.style.cssText = `display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:.72rem;color:${style.accent};font-weight:600;letter-spacing:.06em;text-transform:uppercase`;
  meta.innerHTML = `<span>${style.icon}</span><span>${style.label}</span><span style="margin-left:auto;opacity:.5">第 ${idx+1} 段</span>`;

  const body = document.createElement("p");
  body.style.cssText = `margin:0;line-height:1.85;font-size:.92rem;color:#e8e8e8;min-height:1.2em`;

  card.appendChild(meta);
  card.appendChild(body);
  feed.appendChild(card);

  card.scrollIntoView({ behavior: "smooth", block: "end" });
  return body;
}

async function startGame() {
  const rule = document.getElementById("game-rule").value.trim();
  if (!rule) { showGameError("请输入游戏规则"); return; }
  if (teams.some(t => t.length !== 2)) { showGameError("请确保3组各有2名成员"); return; }

  hideGameError();
  const btn = document.getElementById("start-game-btn");
  btn.disabled = true;
  btn.textContent = "🎬 比赛进行中…";

  // 重置
  paraCount = 0; currentCard = null; typeQueue = []; isTyping = false;
  funNameIdx = 0;
  const feed = document.getElementById("commentary-feed");
  feed.innerHTML = "";

  // 显示比赛标题栏
  const box = document.getElementById("commentary-box");
  box.style.display = "block";
  const matchHeader = document.getElementById("match-header");
  matchHeader.style.display = "block";
  matchHeader.querySelector(".match-teams-row").innerHTML = teams.map((t, i) => {
    const color = TEAM_COLORS[i];
    const name = getTeamDisplayName(i);
    return `<div style="text-align:center;flex:1">
      <div style="font-size:.7rem;color:${color};font-weight:700;letter-spacing:.06em;margin-bottom:4px">${name}</div>
      ${t.map(id => { const up=UPS.find(u=>u.id===id); return `<div style="font-size:.82rem;color:#ccc">${up.emoji} ${NAME_MAP[id]}</div>`; }).join("")}
    </div>`;
  }).join(`<div style="font-size:1.1rem;font-weight:800;color:#888;align-self:center;padding:0 4px">·</div>`);

  document.getElementById("commentary-loading").style.display = "block";
  box.scrollIntoView({ behavior: "smooth", block: "start" });

  let buffer = "";

  try {
    const resp = await fetch("/api/game", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ gameRule: rule, teams, teamNames: teams.map((_,i) => getTeamDisplayName(i)) }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }

    document.getElementById("commentary-loading").style.display = "none";

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let firstChunk = true;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = decoder.decode(value).split("\n");
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6).trim();
        if (data === "[DONE]") break;
        try {
          const { text } = JSON.parse(data);
          if (!text) continue;

          if (firstChunk) {
            firstChunk = false;
            // 创建第一张卡片
            currentCard = addCommentaryCard("", paraCount);
          }

          buffer += text;

          // 按双换行拆段
          const parts = buffer.split(/\n\n+/);
          buffer = parts.pop(); // 最后一段可能未完成

          for (let i = 0; i < parts.length; i++) {
            const p = parts[i].replace(/\n/g, " ").trim();
            if (!p) continue;
            // 当前卡片追加文字
            if (currentCard) {
              const cardEl = currentCard;
              const idx = paraCount;
              typeText(cardEl, p, () => {
                // 段落完成后创建下一张卡片
                paraCount++;
                currentCard = addCommentaryCard("", paraCount);
              });
            }
          }

          // 单换行也分小段（逐字追加进当前卡片）
          const singleParts = buffer.split(/\n/);
          if (singleParts.length > 1) {
            buffer = singleParts.pop();
            // 把单换行之前的部分当作追加文字推进当前卡片
            const chunk = singleParts.join(" ").trim();
            if (chunk && currentCard) {
              const cardEl = currentCard;
              typeText(cardEl, chunk, null);
            }
          }

        } catch {}
      }
    }

    // 渲染剩余
    if (buffer.trim() && currentCard) {
      typeText(currentCard, buffer.trim(), null);
    }

  } catch (e) {
    document.getElementById("commentary-loading").style.display = "none";
    showGameError(e.message || "比赛出错了");
  } finally {
    btn.disabled = false;
    btn.textContent = "🎬 再来一场！";
  }
}

function showGameError(msg) {
  const el = document.getElementById("game-error");
  el.textContent = msg;
  el.classList.add("visible");
}
function hideGameError() {
  document.getElementById("game-error").classList.remove("visible");
}
