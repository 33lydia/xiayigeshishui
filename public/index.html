<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下一个是谁 · UP主语录</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #fb7185;
      --accent2: #38bdf8;
      --text: #e8e8e8;
      --text-dim: #888;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 48px 24px 32px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: .04em;
    }
    header h1 span { color: var(--accent); }
    header p {
      margin-top: 8px;
      color: var(--text-dim);
      font-size: .9rem;
    }

    /* ── UP主 卡片网格 ── */
    .up-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .up-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
    }
    .up-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .up-card.active { border-color: var(--accent); background: var(--surface2); }

    .up-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .up-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .up-name { font-size: 1rem; font-weight: 600; }
    .up-tag {
      display: inline-block;
      margin-top: 2px;
      font-size: .7rem;
      padding: 2px 8px;
      border-radius: 20px;
      opacity: .8;
    }

    .quotes-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .quotes-list li {
      font-size: .82rem;
      color: var(--text-dim);
      padding: 6px 10px;
      background: var(--bg);
      border-radius: 8px;
      border-left: 3px solid var(--card-color, #444);
      transition: color .2s;
    }
    .up-card:hover .quotes-list li,
    .up-card.active .quotes-list li {
      color: var(--text);
    }

    /* ── Chat Panel ── */
    #chat-section {
      max-width: 760px;
      margin: 0 auto 60px;
      padding: 0 24px;
      display: none;
    }
    #chat-section.visible { display: block; }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .chat-header .up-avatar { width: 44px; height: 44px; font-size: 1.2rem; }
    .chat-header-info h2 { font-size: 1.1rem; font-weight: 600; }
    .chat-header-info p { font-size: .8rem; color: var(--text-dim); margin-top: 2px; }


    /* Messages */
    #messages {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 200px;
      max-height: 440px;
      overflow-y: auto;
      padding: 4px 2px;
      margin-bottom: 16px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 10px;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { flex-direction: row-reverse; }
    .msg-bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: .9rem;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .msg.assistant .msg-bubble {
      background: var(--surface2);
      border-bottom-left-radius: 4px;
    }
    .msg.user .msg-bubble {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem;
      font-weight: 700;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input row */
    .input-row {
      display: flex;
      gap: 8px;
    }
    .input-row textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color .2s;
    }
    .input-row textarea:focus { border-color: var(--accent2); }
    .input-row textarea::placeholder { color: var(--text-dim); }
    .send-btn {
      width: 44px; height: 44px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity .2s;
      display: flex; align-items: center; justify-content: center;
      align-self: flex-end;
    }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .send-btn:not(:disabled):hover { opacity: .85; }

    .error-bar {
      background: #3f1313;
      border: 1px solid #7f2020;
      color: #fca5a5;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: .82rem;
      margin-bottom: 10px;
      display: none;
    }
    .error-bar.visible { display: block; }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      color: var(--text-dim);
      font-size: .75rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>

const grid = document.getElementById("up-grid");

UPS.forEach(up => {
  const card = document.createElement("div");

  card.dataset.id = up.id;
  card.style.setProperty("--card-color", up.color);
  card.innerHTML = `
    <div class="up-card-header">
      <div class="up-avatar" style="background:${up.bgColor};color:${up.color}">${up.emoji}</div>
      <div>
        <div class="up-name">${up.name}</div>
        <span class="up-tag" style="background:${up.bgColor};color:${up.color}">${up.tag}</span>
      </div>
    </div>
    <ul class="quotes-list">
      ${up.quotes.slice(0, 3).map(q => `<li>「${q}」</li>`).join("")}
    </ul>
  `;
  card.addEventListener("click", () => selectUp(up));
  grid.appendChild(card);
});

// ── 选择 UP 主 ────────────────────────────────────────────────────────────
function selectUp(up) {
  currentUp = up;
  chatHistory = [];

  document.querySelectorAll(".up-card").forEach(c => c.classList.remove("active"));
  document.querySelector(`[data-id="${up.id}"]`).classList.add("active");

  document.getElementById("chat-avatar").textContent = up.emoji;
  document.getElementById("chat-avatar").style.background = up.bgColor;
  document.getElementById("chat-avatar").style.color = up.color;
  document.getElementById("chat-name").textContent = up.name;
  document.getElementById("chat-desc").textContent = up.tag;

  document.getElementById("messages").innerHTML = "";
  hideError();

  // 打招呼
  const greeting = getGreeting(up);
  appendMessage("assistant", greeting, up);

  const section = document.getElementById("chat-section");
  section.classList.add("visible");
  section.scrollIntoView({ behavior: "smooth", block: "start" });
}

// ── 发送消息 ──────────────────────────────────────────────────────────────
document.getElementById("send-btn").addEventListener("click", sendMessage);
document.getElementById("user-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Auto-resize textarea
document.getElementById("user-input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});

async function sendMessage() {
  if (!currentUp || isLoading) return;
  const text = document.getElementById("user-input").value.trim();
  if (!text) return;

  hideError();
  document.getElementById("user-input").value = "";
  document.getElementById("user-input").style.height = "auto";
  appendMessage("user", text, currentUp);

  chatHistory.push({ role: "user", content: text });

  setLoading(true);
  const typingEl = showTyping();

  try {
    const reply = await callClaude(currentUp.style, chatHistory);
    typingEl.remove();
    appendMessage("assistant", reply, currentUp);
    chatHistory.push({ role: "assistant", content: reply });
  } catch (err) {
    typingEl.remove();
    showError(err.message || "请求失败，请检查 API Key 或网络");
    // 回滚最后一条 user 消息
    chatHistory.pop();
  } finally {
    setLoading(false);
  }
}

// ── 后端代理调用 ──────────────────────────────────────────────────────────
async function callClaude(systemPrompt, history) {
  const resp = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system: systemPrompt, messages: history }),
  });

  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
  return data.text;
}

// ── UI 工具函数 ───────────────────────────────────────────────────────────
function appendMessage(role, text, up) {
  const msgsEl = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `msg ${role}`;

  if (role === "assistant") {
    div.innerHTML = `
      <div class="msg-avatar" style="background:${up.bgColor};color:${up.color}">${up.emoji}</div>
      <div class="msg-bubble">${escapeHtml(text)}</div>
    `;
  } else {
    div.innerHTML = `
      <div class="msg-bubble">${escapeHtml(text)}</div>
      <div class="msg-avatar" style="background:#1d4ed8;color:#fff">你</div>
    `;
  }

  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function showTyping() {
  const msgsEl = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg assistant";
  div.innerHTML = `
    <div class="msg-avatar" style="background:${currentUp.bgColor};color:${currentUp.color}">${currentUp.emoji}</div>
    <div class="typing-indicator"><span></span><span></span><span></span></div>
  `;
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return div;
}

function setLoading(v) {
  isLoading = v;
  document.getElementById("send-btn").disabled = v;
  document.getElementById("user-input").disabled = v;
}

function showError(msg) {
  const el = document.getElementById("error-bar");
  el.textContent = msg;
  el.classList.add("visible");
}
function hideError() {
  document.getElementById("error-bar").classList.remove("visible");
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
</script>
